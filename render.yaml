# NOTE: this free-tier config has NO persistent disk (Render's free plan doesn't support
# them), so all data is lost on every redeploy/restart. Fine for a live demo; before
# real customer data, upgrade `plan` below to a paid tier and add a `disk:` block back.
services:
  - type: web
    name: facturation-pro-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: facturation-pro-web
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
